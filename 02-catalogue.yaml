- name: Configure Catalogue Server
  hosts: catalogue
  become: yes
  tasks:
  - name: Disable nodejs
    ansible.builtin.command: dnf module disable nodejs -y

  - name: Enable nodejs
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: Install nodejs
    ansible.builtin.dnf:
     name: nodejs
     state: present

  - name: Create roboshop system user
    ansible.builtin.user:
     name: roboshop
     system: yes
     shell: /sbin/nologin

  - name: Create /app directory
    ansible.builtin.file:
     path: /app
     state: directory

  - name: Download catalogue code
    ansible.builtin.get_url:
     url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
     dest: /tmp/catalogue.zip

  - name: Unzip catalogue code
    ansible.builtin.unarchive:
     src: /tmp/catalogue.zip
     dest: /app
     remote_src: yes

  - name: Install Dependencies
    ansible.builtin.command: npm install
    args:
     chdir: /app

  - name: Copy catalogue.service file
    ansible.builtin.copy:
     src: catalogue.service
     dest: /etc/systemd/system/catalogue.service

  - name: Daemon Reload
    ansible.builtin.systemd:
     daemon_reload: yes

  - name: Start and enable catalogue service
    ansible.builtin.systemd:
     name: catalogue
     state: started
     enabled: yes

  - name: Copy mongo.repo file
    ansible.builtin.copy:
     src: mongo.repo
     dest: /etc/yum.repos.d/mongo.repo

  - name: Install mongodb mongosh client
    ansible.builtin.package:
     name: mongodb-mongosh
     state: present

  - name: Check if products exists
    ansible.builtin.command: |
    mongosh --host mongodb.sivarobos.shop --quiet --eval "db.getSiblingDB('catalogue').getCollectionNames().includes('products')"
    register: mongo_check
    changed_when: false

  - name: Load products
    ansible.builtin.shell: mongosh --host mongodb.sivarobos.shop < /app/db/master-data.js
    when: mongo_check.stdout == "false"